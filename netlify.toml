[build]
  publish = "."

[[redirects]]
  from   = "/"
  to     = "/index-ios.html"
  status = 200

# Required for WebXR: COOP must be same-origin.
# We skip COEP here so CDN (jsDelivr) assets can load without issues.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy    = "same-origin"
    X-Frame-Options               = "DENY"
    X-Content-Type-Options        = "nosniff"
    Referrer-Policy               = "strict-origin-when-cross-origin"

# Flood data files
[[headers]]
  for = "/data/*.json"
  [headers.values]
    Content-Type  = "application/json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/data/*.bin"
  [headers.values]
    Content-Type  = "application/octet-stream"
    Cache-Control = "public, max-age=86400"
